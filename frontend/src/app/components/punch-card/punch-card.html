<div [class]="cardClass()">
  <div class="flex justify-between items-start">
    <span [class]="titleClass()">
      {{ batida().titulo }}
    </span>

    <div [class]="iconClass()">
      <span class="material-symbols-outlined text-[20px]">
        {{ batida().icone }}
      </span>
    </div>
  </div>

  <div class="space-y-1">
    <span [class]="horarioClass()">
      {{ batida().horario }}
    </span>

    <p [class]="detalheClass()">
      {{ batida().detalhe }}
    </p>
  </div>
</div>
