<nav class="hidden lg:flex flex-col h-full w-64 bg-slate-50 border-r border-slate-200 py-8 px-4 gap-2">

  <!-- Avatar + usuário -->
  <div class="flex items-center gap-3 px-2 mb-8">
    <div class="w-10 h-10 rounded-full bg-blue-900 text-white flex items-center justify-center text-sm font-bold shrink-0">
      {{ iniciais() }}
    </div>

    <div class="flex flex-col min-w-0">
      <span class="text-sm font-semibold text-blue-900 leading-tight truncate">
        {{ usuario()?.nome ?? 'Colaborador' }}
      </span>
      <span class="text-xs text-slate-500 capitalize">
        {{ usuario()?.perfil ?? '' }}
      </span>
    </div>
  </div>

  <!-- Itens de menu -->
  @for (item of menuItems(); track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="bg-blue-50 text-blue-900 border-r-4 border-blue-900 font-semibold"
      class="flex items-center gap-3 px-4 py-3 rounded text-sm text-slate-600 transition-all hover:bg-slate-100 hover:text-blue-800 active:scale-[0.98]"
    >
      <span class="material-symbols-outlined text-[20px]">{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </a>
  }

  <!-- Logout -->
  <div class="mt-auto px-2">
    <button
      type="button"
      (click)="sair()"
      class="w-full text-slate-600 py-3 rounded font-medium flex items-center justify-center gap-2 hover:bg-red-50 hover:text-red-700 transition-all text-sm"
    >
      <span class="material-symbols-outlined text-[20px]">logout</span>
      Sair
    </button>
  </div>

</nav>
