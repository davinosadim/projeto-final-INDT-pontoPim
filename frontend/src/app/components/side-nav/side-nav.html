<nav
  class="hidden lg:flex flex-col h-full w-64 bg-slate-50 border-r border-slate-200 py-8 px-4 gap-2"
>
  <div class="flex items-center gap-3 px-2 mb-8">
    <img
      [src]="user.avatarUrl"
      alt="Foto do colaborador"
      class="w-10 h-10 rounded-full object-cover"
    />

    <div class="flex flex-col">
      <span class="text-sm font-semibold text-blue-900 leading-tight">
        {{ user.name }}
      </span>

      <span class="text-xs text-slate-500">
        {{ user.department }}
      </span>
    </div>
  </div>

  @for (item of menuItems; track item.label) {
    <a
      [href]="item.route"
      class="flex items-center gap-3 px-4 py-3 rounded text-sm transition-transform active:scale-[0.98]"
      [class.bg-blue-50]="item.active"
      [class.text-blue-900]="item.active"
      [class.border-r-4]="item.active"
      [class.border-blue-900]="item.active"
      [class.font-semibold]="item.active"
      [class.text-slate-600]="!item.active"
      [class.hover:bg-slate-100]="!item.active"
      [class.hover:text-blue-800]="!item.active"
    >
      <span class="material-symbols-outlined">
        {{ item.icon }}
      </span>

      <span>
        {{ item.label }}
      </span>
    </a>
  }

  <div class="mt-auto px-2">
    <button
      type="button"
      class="w-full bg-emerald-500 text-white py-3 rounded font-semibold flex items-center justify-center gap-2 hover:opacity-90 transition-all"
    >
      <span class="material-symbols-outlined">
        timer
      </span>

      Quick Clock-In
    </button>
  </div>
</nav>
