<header class="h-16 w-full fixed top-0 z-40 flex items-center justify-between px-6 bg-white border-b border-slate-200">

  <div class="flex items-center gap-4">
    <span class="material-symbols-outlined text-blue-900">schedule</span>
    <span class="text-xl font-bold text-blue-900">{{ appName }}</span>
  </div>

  <div class="flex items-center gap-3">
    <button
      type="button"
      (click)="sair()"
      class="hidden md:flex items-center gap-1 text-sm text-slate-500 hover:text-red-700 hover:bg-red-50 px-3 py-2 rounded-lg transition-all"
    >
      <span class="material-symbols-outlined text-[18px]">logout</span>
      Sair
    </button>

    <div class="w-8 h-8 rounded-full bg-blue-900 text-white flex items-center justify-center text-xs font-bold">
      {{ iniciais() }}
    </div>
  </div>

</header>
