<header
  class="h-16 w-full fixed top-0 z-40 flex items-center justify-between px-6 bg-white border-b border-slate-200"
>
  <div class="flex items-center gap-4">
    <span class="text-xl font-bold text-blue-900">
      {{ appName }}
    </span>
  </div>

  <div class="flex items-center gap-5">

    <button
      type="button"
      class="p-2 rounded-full text-slate-500 hover:bg-slate-100 hover:text-blue-900 transition"
    >
      <span class="material-symbols-outlined">
        notifications
      </span>
    </button>

    <button
      type="button"
      class="p-2 rounded-full text-slate-500 hover:bg-slate-100 hover:text-blue-900 transition"
    >
      <span class="material-symbols-outlined">
        help
      </span>
    </button>

    <img
      [src]="avatarUrl"
      alt="Foto do colaborador"
      class="w-8 h-8 rounded-full border border-slate-200 object-cover"
    />

  </div>
</header>
