<section
  class="bg-white border border-slate-200 rounded-xl p-8 flex flex-col items-center justify-center gap-6 relative overflow-hidden"
>
  <div class="absolute -right-16 -top-16 w-64 h-64 bg-blue-900/5 rounded-full blur-3xl"></div>

  <div class="z-10 text-center space-y-2">
    <p class="text-xs font-semibold text-blue-900 tracking-wide uppercase">
      Próximo registro esperado
    </p>

    <h2 class="text-2xl font-semibold text-slate-900">
      {{ proximaBatida }}
    </h2>
  </div>

  <button
    type="button"
    (click)="onRegistrar()"
    class="z-10 w-full max-w-md h-16 bg-emerald-700 text-white rounded-lg text-sm font-semibold flex items-center justify-center gap-3 hover:bg-emerald-800 active:scale-95 transition-all shadow-lg shadow-emerald-700/20"
  >
    <span class="material-symbols-outlined text-xl">
      login
    </span>

    Registrar {{ proximaBatida }}
  </button>

  <div class="z-10 flex items-center gap-2 text-slate-600">
    <span class="material-symbols-outlined text-lg">
      location_on
    </span>

    <span class="text-xs">
      Geolocalização ativa: Escritório Central
    </span>
  </div>
</section>
