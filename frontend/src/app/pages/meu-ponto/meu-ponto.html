<app-top-bar></app-top-bar>

<div class="flex pt-16 min-h-screen bg-[#f8f9ff] text-[#0b1c30]">
  <app-side-nav></app-side-nav>

  <main class="flex-1 overflow-y-auto px-6 md:px-12 py-10 pb-32 lg:pb-10">
    <div class="max-w-4xl mx-auto space-y-10">

      <section class="flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
          <h1 class="text-3xl font-semibold text-blue-900 mb-1">
            Olá, Davino!
          </h1>

          <p class="text-sm text-slate-600">
            Quarta-feira, 24 de Maio de 2024
          </p>
        </div>

        <div class="text-right">
          <span class="text-6xl font-bold text-blue-900 block">
            12:30
          </span>

          <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">
            Horário de Brasília
          </span>
        </div>
      </section>


      <app-punch-action-card
       [proximaBatida]="proximaBatida"
        (registrar)="registrarPonto()"
      >
      </app-punch-action-card>

      <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        @for (batida of batidas; track batida.titulo) {
          <app-punch-card [batida]="batida"></app-punch-card>
        }
      </section>



    </div>
  </main>
</div>
